name: PostgreSQL Digest

on:
  schedule:
    # JST 07:00 = UTC 22:00 (previous day)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      llm_cli:
        description: "LLM CLI (claude / codex / gemini)"
        required: false
        default: "gemini"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Compute digest date
        id: date
        run: echo "value=$(date -u -d 'yesterday' +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Generate PostgreSQL digest
        env:
          DIGEST_LLM_CLI: ${{ github.event.inputs.llm_cli || vars.DIGEST_LLM_CLI || 'claude' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_postgresql_digest.py

      - name: Create pull request to main
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: chore/pg-digest-${{ steps.date.outputs.value }}
          delete-branch: true
          commit-message: "Add PostgreSQL digest for ${{ steps.date.outputs.value }}"
          title: "Add PostgreSQL digest for ${{ steps.date.outputs.value }}"
          body: |
            This PR is automatically created by the PostgreSQL digest workflow.

            - Generated digest updates in `digests/`
            - Digest date: `${{ steps.date.outputs.value }}`
            - Triggered by workflow run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
          add-paths: |
            digests/*.md
