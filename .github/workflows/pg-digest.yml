name: PostgreSQL Digest

on:
  schedule:
    # JST 07:00 = UTC 22:00 (previous day)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      llm_cli:
        description: "LLM CLI (claude / codex / gemini)"
        required: false
        default: "gemini"
      model:
        description: "Model name (e.g. sonnet, gemini-2.0-flash, o3)"
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install LLM CLI
        env:
          DIGEST_LLM_CLI: ${{ github.event.inputs.llm_cli || vars.DIGEST_LLM_CLI || 'gemini' }}
        run: |
          case "$DIGEST_LLM_CLI" in
            claude)
              npm install -g @anthropic-ai/claude-code
              ;;
            gemini)
              npm install -g @google/gemini-cli
              ;;
            codex)
              npm install -g @openai/codex
              ;;
            *)
              echo "Unknown LLM CLI: $DIGEST_LLM_CLI" >&2
              exit 1
              ;;
          esac

      - name: Compute digest date
        id: date
        run: echo "value=$(date -u -d 'yesterday' +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Generate PostgreSQL digest
        env:
          DIGEST_LLM_CLI: ${{ github.event.inputs.llm_cli || vars.DIGEST_LLM_CLI || 'gemini' }}
          DIGEST_LLM_MODEL: ${{ github.event.inputs.model || vars.DIGEST_LLM_MODEL }}
          DIGEST_LLM_TIMEOUT: ${{ vars.DIGEST_LLM_TIMEOUT || '600' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_postgresql_digest.py

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/*.md
          git diff --cached --quiet || git commit -m "${{ steps.date.outputs.value }}"

      - name: Create pull request to main
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: chore/pg-digest-${{ steps.date.outputs.value }}
          delete-branch: true
          title: "Add PostgreSQL digest for ${{ steps.date.outputs.value }}"
          body: |
            This PR is automatically created by the PostgreSQL digest workflow.

            - Generated digest updates in `digests/`
            - Digest date: `${{ steps.date.outputs.value }}`
            - Triggered by workflow run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
